name: SonarQube Scan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          projectKey: Cig
          projectName: Cig
          token: ${{ secrets.SONAR_TOKEN }}
          host_url: ${{ secrets.SONAR_HOST_URL }}
